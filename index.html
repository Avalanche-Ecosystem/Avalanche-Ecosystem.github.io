<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avalanche Ecosystem - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Avalanche Ecosystem DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://avalanche-ecosystem.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f7f5f3;
  --bg-soft: #fbfaf8;
  --surface: #ffffff;
  --surface-muted: #f2f0ed;
  --ink: #171717;
  --text: #3f3c39;
  --muted: #7b746f;
  --faint: #aaa39d;
  --line: rgba(23, 23, 23, .10);
  --line-strong: rgba(23, 23, 23, .16);
  --accent: #E84142;
  --accent-soft: rgba(232, 65, 66, .10);
  --shadow: 0 30px 80px -46px rgba(23, 23, 23, .46);
  --max: 1080px;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(70% 48% at 50% -18%, var(--accent-soft), transparent 66%),
    linear-gradient(180deg, var(--bg-soft), var(--bg));
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  width: 100%;
  max-width: calc(var(--max) + 80px);
  margin: 0 auto;
  padding: 18px clamp(16px, 4vw, 40px) 8px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1rem;
  font-weight: 760;
  color: var(--ink);
  white-space: nowrap;
}

.brand img {
  flex: none;
  border-radius: 9px;
  box-shadow: 0 0 0 1px var(--line);
}

.nav {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-left: 6px;
}

.nav a {
  color: var(--muted);
  font-size: .92rem;
  font-weight: 560;
  white-space: nowrap;
  transition: color .16s ease;
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 18px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, .58);
  color: var(--ink);
  font-size: .92rem;
  font-weight: 700;
  box-shadow: 0 12px 30px -24px rgba(23, 23, 23, .50);
  transition: transform .14s ease, border-color .16s ease, background .16s ease;
}

.ghost:hover {
  transform: translateY(-1px);
  border-color: rgba(23, 23, 23, .26);
  background: var(--surface);
}

.stage {
  flex: 1;
  width: 100%;
  max-width: var(--max);
  margin: 0 auto;
  padding: 8px clamp(16px, 4vw, 40px) 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero {
  width: 100%;
}

h1 {
  margin: 0;
  font-size: clamp(2.75rem, 7vw, 5rem);
  line-height: .98;
  letter-spacing: 0;
  font-weight: 820;
}

.sub {
  max-width: 660px;
  margin: 18px auto 0;
  color: var(--text);
  font-size: clamp(1rem, 1.65vw, 1.17rem);
}

.sub strong {
  color: var(--ink);
  font-weight: 780;
  box-shadow: inset 0 -.44em 0 var(--accent-soft);
}

.app-card {
  width: min(520px, 100%);
  margin-top: 34px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: rgba(255, 255, 255, .92);
  box-shadow: var(--shadow);
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.kicker {
  color: var(--faint);
  font-size: .72rem;
  font-weight: 760;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.switch {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 62px;
  height: 30px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  font: inherit;
  font-size: .76rem;
  font-weight: 720;
  cursor: pointer;
  transition: color .16s ease, border-color .16s ease, background .16s ease;
}

.switch:hover {
  color: var(--accent);
  border-color: rgba(232, 65, 66, .34);
  background: var(--accent-soft);
}

.chips {
  display: grid;
  grid-template-columns: 1.08fr .92fr;
  gap: 12px;
}

.chip {
  min-width: 0;
  min-height: 82px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--surface-muted);
  color: var(--muted);
  font-weight: 760;
  transition: background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
}

.chip img {
  flex: none;
  border-radius: 50%;
}

.chip span {
  min-width: 0;
}

.chip.is-active {
  background: var(--surface);
  border-color: rgba(232, 65, 66, .42);
  color: var(--ink);
  box-shadow: inset 0 0 0 1px rgba(232, 65, 66, .12), 0 18px 44px -36px rgba(23, 23, 23, .58);
}

.chip-primary {
  font-size: 1.08rem;
}

.chip-hint {
  font-size: .93rem;
}

.primary {
  width: 100%;
  min-height: 56px;
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  background: var(--accent);
  color: #ffffff;
  font-size: 1.04rem;
  font-weight: 820;
  box-shadow: 0 20px 42px -28px rgba(232, 65, 66, .92);
  transition: transform .14s ease, box-shadow .16s ease;
}

.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 24px 48px -28px rgba(232, 65, 66, 1);
}

.foot {
  width: 100%;
  padding: 12px 24px 22px;
  text-align: center;
  color: var(--muted);
  font-size: .86rem;
  font-weight: 560;
}

@media (max-width: 760px) {
  .topbar {
    gap: 12px;
  }

  .nav {
    display: none;
  }
}

@media (max-width: 520px) {
  .topbar {
    padding-top: 14px;
  }

  .brand {
    font-size: .94rem;
  }

  .ghost {
    min-height: 36px;
    padding: 0 13px;
    font-size: .86rem;
  }

  .stage {
    justify-content: flex-start;
    padding-top: 32px;
  }

  h1 {
    font-size: 2.82rem;
  }

  .sub {
    margin-top: 14px;
    font-size: 1rem;
  }

  .app-card {
    margin-top: 24px;
    padding: 16px;
    border-radius: 20px;
  }

  .chips {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .chip {
    min-height: 68px;
  }

  .primary {
    min-height: 52px;
  }

  .foot {
    padding-bottom: 16px;
  }
}

@media (max-width: 390px) {
  .topbar {
    padding-left: 12px;
    padding-right: 12px;
  }

  .brand span {
    max-width: 172px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stage {
    padding-left: 14px;
    padding-right: 14px;
  }
}

  
  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Avalanche Ecosystem</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Avalanche Ecosystem</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Avalanche Ecosystem &mdash; 2026</footer>
</body>
</html>
