  <link rel="canonical" href="https://avalanche-ecosystem.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F5F3">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Avalanche Ecosystem">
  <meta property="og:description" content="Avalanche Ecosystem is the network of DeFi, gaming and NFT apps built on Avalanche, reached from your own wallet.">
  <meta property="og:url" content="https://avalanche-ecosystem.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Avalanche Ecosystem">
  <meta name="twitter:description" content="Avalanche Ecosystem is the network of DeFi, gaming and NFT apps built on Avalanche, reached from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://avalanche-ecosystem.github.io/#website",
        "url": "https://avalanche-ecosystem.github.io/",
        "name": "Avalanche Ecosystem",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://www.avax.network/#organization",
        "name": "Avalanche",
        "url": "https://www.avax.network/",
        "sameAs": [
          "https://www.avax.network/"
        ]
      },
      {
        "@type": "WebApplication",
        "@id": "https://avalanche-ecosystem.github.io/#app",
        "name": "Avalanche Ecosystem",
        "applicationCategory": "WebApplication",
        "operatingSystem": "Web",
        "url": "https://avalanche-ecosystem.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="Open Avalanche Ecosystem">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Avalanche Ecosystem</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://snowtrace.io/" target="_blank" rel="nofollow noopener noreferrer">Snowtrace</a>
      <a href="https://www.avax.network/" target="_blank" rel="nofollow noopener noreferrer">Avalanche network</a>
      <a href="https://defillama.com/chain/avalanche" target="_blank" rel="nofollow noopener noreferrer">DefiLlama data</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Avalanche Ecosystem</h1>
      <p class="sub"><strong>Avalanche Ecosystem</strong> is the network of DeFi, gaming and NFT apps built on Avalanche, reached from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Ecosystem entry">
      <div class="card-top">
        <span class="kicker">Destination</span>
        <button class="switch" type="button" data-switch aria-label="Switch highlighted destination">
          <span aria-hidden="true">Switch</span>
        </button>
      </div>
      <div class="chips" data-chips>
        <span class="chip chip-primary is-active" data-chip="avalanche">
          <img src="avax.png" width="32" height="32" alt="">
          <span>Avalanche</span>
        </span>
        <span class="chip chip-hint" data-chip="ethereum">
          <img src="eth.png" width="28" height="28" alt="">
          <span>Bridge from Ethereum</span>
        </span>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Avalanche Ecosystem — 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    var chips = document.querySelectorAll("[data-chip]");
    if (!button || chips.length !== 2) return;

    button.addEventListener("click", function(){
      chips[0].classList.toggle("is-active");
      chips[1].classList.toggle("is-active");
    });
  })();
  </script>
</body>
</html>
